services:
  server:
    restart: always
    build:
      context: ./
      dockerfile: Dockerfile.prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      mosquitto:
        condition: service_healthy
      postgreSql:
        condition: service_healthy
    networks:
      - smart-control-network

  postgreSql:
    restart: always
    image: postgres:18-alpine3.22
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - database_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smart-control-network

  mosquitto:
    image: eclipse-mosquitto:2.1.2-alpine
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mqtt_volume.config:/mosquitto/config
      - mqtt_volume.data:/mosquitto/data
      - mqtt_volume.log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -E -i healthcheck -p 1883 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - smart-control-network

networks:
  smart-control-network:
    driver: bridge

volumes:
  mqtt_volume.config:
  mqtt_volume.data:
  mqtt_volume.log:
  database_volume:
